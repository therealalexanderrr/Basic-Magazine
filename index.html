<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÅSIC MAGAZINE | 首页专栏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #dcd8cf; 
            color: #4d3326; 
            margin: 0;
            overflow-x: hidden; /* 防止竖屏左右乱晃 */
        }

        .article-icon { 
            background-color: rgba(245, 208, 76, 0.9); 
            color: #000; 
        }

        /* 导航下拉动画 */
        #nav-links { 
            transition: max-height 0.5s ease-in-out; 
        }

        /* --- 核心：横屏侧滑逻辑 --- */
        @media (orientation: landscape) {
            /* 让 main 容器变成横向排列 */
            main {
                display: flex !important;
                flex-direction: row !important;
                overflow-x: auto !important; /* 开启水平滚动 */
                overflow-y: hidden !important;
                scroll-snap-type: x mandatory; /* 增加滑动吸附感，更像翻书 */
                height: calc(100vh - 120px); /* 减去导航栏高度 */
                padding: 20px 50px !important;
                gap: 40px !important;
                width: 100vw;
            }

            /* 每个帖子在横屏下的容器 */
            main a {
                flex: 0 0 auto; /* 不收缩 */
                height: 100%; /* 高度撑满 */
                scroll-snap-align: center;
            }

            /* 保持图片在侧滑时的比例 */
            main img {
                height: 100%;
                width: auto; /* 让宽度根据 3:4 自动计算 */
                object-fit: contain;
            }

            /* 隐藏滚动条但保留滚动功能 (Chrome/Safari) */
            main::-webkit-scrollbar {
                display: none;
            }
        }
    </style>
</head>

                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>

                </button>
            </div>

            <div id="nav-links" style="max-height: 0px;" class="overflow-hidden">

            </div>
        </nav>

    <main class="max-w-screen-md mx-auto px-6 py-10 space-y-16">

            <div class="absolute top-4 left-4 z-10 article-icon px-3 py-1 text-[10px] font-bold tracking-widest rounded">文章</div>
            <div class="aspect-[3/4] h-full overflow-hidden rounded-sm bg-gray-300 shadow-xl transition-transform duration-500 group-hover:scale-[1.01]">

    <script>
        function toggleNav() {
            const navLinks = document.getElementById('nav-links');
            if (navLinks.style.maxHeight === "0px" || navLinks.style.maxHeight === "") {
                navLinks.style.maxHeight = "120px"; 
            } else {
                navLinks.style.maxHeight = "0px";
            }
