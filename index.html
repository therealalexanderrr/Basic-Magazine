<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÅSIC MAGAZINE | 首页专栏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #dcd8cf; 
            color: #4d3326; 
            margin: 0;
            overflow-x: hidden;
        }

        header { 
            position: relative; 
            z-index: 9999; 
            background-color: #dcd8cf;
        }

        /* 修复标签：强制不换行，防止文字变竖 */
        .article-icon { 
            background-color: rgba(245, 208, 76, 0.9); 
            color: #000; 
            white-space: nowrap; 
            display: inline-block;
        }

        #nav-links { 
            transition: max-height 0.4s ease-out;
            overflow: hidden;
        }

        /* --- 横屏滚轴样式 --- */
        @media (orientation: landscape) {
            .swiper {
                width: 100%;
                height: calc(100vh - 80px);
                z-index: 10;
            }
            .swiper-slide {
                display: flex;
                justify-content: center;
                align-items: center;
                transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
                transform: scale(0.75);
                opacity: 0.4;
            }
            .swiper-slide-active {
                transform: scale(1.02);
                opacity: 1;
            }
            .swiper-slide img {
                max-height: 70vh;
                width: auto;
                aspect-ratio: 3/4;
                object-fit: cover;
                box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            }
            footer { display: none; }
        }

        /* --- 竖屏布局：彻底重置 Swiper 干扰 --- */
        @media (orientation: portrait) {
            header { position: sticky; top: 0; border-bottom: 1px solid #c7c0af; }
            .swiper-wrapper {
                display: block !important; /* 强制取消 flex 排列 */
                padding: 40px 24px !important;
                max-width: 500px; /* 限制宽度防止偏移 */
                margin: 0 auto !important;
                transform: none !important;
            }
            .swiper-slide {
                width: 100% !important;
                display: block !important; /* 取消 flex */
                transform: none !important;
                opacity: 1 !important;
                margin-bottom: 60px !important;
                height: auto !important;
            }
            .swiper-slide img {
                width: 100% !important;
                height: auto !important;
                aspect-ratio: 3/4;
                object-fit: cover;
                border-radius: 2px;
            }
            footer { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <nav class="max-w-screen-md mx-auto px-6 py-6">
            <div class="flex justify-between items-center">
                <a href="index.html">
                    <h1 class="text-3xl font-black tracking-tighter">BÅSIC MAGAZINE.</h1>
                </a>
                <button onclick="toggleNav()" class="p-1 focus:outline-none">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="nav-links" style="max-height: 0px;">
                <div class="mt-6 pb-2 border-t border-[#c7c0af]/30 flex justify-around items-center pt-6 text-[12px] font-bold tracking-widest uppercase text-[#4d3326]">
                    <a href="index.html" class="text-[#f5d04c]">首页专栏</a>
                    <a href="hotels.html" class="hover:text-[#f5d04c]">酒店分享</a>
                    <a href="social.html" class="hover:text-[#f5d04c]">社媒导航</a>
                    <a href="about.html" class="hover:text-[#f5d04c]">关于我们</a>
                </div>
            </div>
        </nav>
    </header>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <a href="https://weibo.com/7465274644/5280051904119993" target="_blank" class="block relative group">
                    <div class="absolute top-4 left-4 z-20 article-icon px-3 py-1 text-[10px] font-bold tracking-widest rounded shadow-md">文章</div>
                    <img src="vol5.PNG" alt="vol5">
                </a>
            </div>
            <div class="swiper-slide">
                <a href="https://weibo.com/7465274644/5279423488068621" target="_blank" class="block relative group">
                    <div class="absolute top-4 left-4 z-20 article-icon px-3 py-1 text-[10px] font-bold tracking-widest rounded shadow-md">文章</div>
                    <img src="vol4.JPG" alt="vol4">
                </a>
            </div>
            <div class="swiper-slide">
                <a href="https://weibo.com/7465274644/5278560929451127" target="_blank" class="block relative group">
                    <div class="absolute top-4 left-4 z-20 article-icon px-3 py-1 text-[10px] font-bold tracking-widest rounded shadow-md">文章</div>
                    <img src="vol3.JPG" alt="vol3">
                </a>
            </div>
            <div class="swiper-slide">
                <a href="https://weibo.com/7465274644/4857556000315503" target="_blank" class="block relative group">
                    <div class="absolute top-4 left-4 z-20 article-icon px-3 py-1 text-[10px] font-bold tracking-widest rounded shadow-md">文章</div>
                    <img src="vol2.PNG" alt="vol2">
                </a>
            </div>
            <div class="swiper-slide">
                <a href="https://weibo.com/7465274644/4854527280808008" target="_blank" class="block relative group">
                    <div class="absolute top-4 left-4 z-20 article-icon px-3 py-1 text-[10px] font-bold tracking-widest rounded shadow-md">文章</div>
                    <img src="vol1.PNG" alt="vol1">
                </a>
            </div>
        </div>
    </div>

    <footer class="py-20 text-center border-t border-[#c7c0af] mt-10">
        <p class="text-[10px] uppercase tracking-[0.3em] opacity-50">© 2026 BÅSIC MAGAZINE. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        let swiper = null;

        function handleLayout() {
            const isLandscape = window.innerWidth > window.innerHeight;
            if (isLandscape) {
                if (!swiper) {
                    swiper = new Swiper(".mySwiper", {
                        slidesPerView: 1.8, 
                        centeredSlides: true,
                        spaceBetween: 0,
                        loop: true,
                        keyboard: true,
                        mousewheel: true
                    });
                }
            } else {
                if (swiper) {
                    swiper.destroy(true, true);
                    swiper = null;
                }
            }
        }

        window.addEventListener('resize', handleLayout);
        window.addEventListener('load', handleLayout);

        function toggleNav() {
            const el = document.getElementById('nav-links');
            el.style.maxHeight = (el.style.maxHeight === '0px' || !el.style.maxHeight) ? '200px' : '0px';
        }
    </script>
</body>
</html>
